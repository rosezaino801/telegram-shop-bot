services:
  - type: web
    name: telegram-shop-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # required — bot token from @BotFather
      - key: GEMINI_API_KEY
        sync: false          # required — Google Gemini API key
      - key: ADMIN_CHAT_ID
        sync: false          # optional — your numeric Telegram ID for admin panel
